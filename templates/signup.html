<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Signup | ResumeAI</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Create Account</h1>
        <p>Register new HR account</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for msg in messages %}
                    <div class="error-msg">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <div class="field">
                <label>Full Name</label>

                <input type="text"
                       name="name"
                       required>
            </div>

            <div class="field">
                <label>Email</label>

                <input type="email"
                       name="email"
                       required>
            </div>

            <div class="field">
                <label>Password</label>

                <input type="password"
                       name="password"
                       required>
            </div>

            <button type="submit"
                    class="btn btn-primary"
                    style="width:100%;">
                Create Account
            </button>

        </form>

        <div style="margin-top:15px;text-align:center;">
            Already have an account?

            <a href="/login">
                Login
            </a>
        </div>

    </div>

</div>

</body>
</html>
